   * CCB Admin Web App - Client-side JavaScript

  // INITIALIZATION

  document.addEventListener('DOMContentLoaded', function () {

  // ============================================================================

  function switchTab(tabName) {
    currentTab = tabName;

    // Update tab buttons
    document.querySelectorAll('.tab-btn').forEach(function (btn) {
      btn.classList.toggle('active', btn.dataset.tab === tabName.toLowerCase());
    });

    // Update tab content
    document.querySelectorAll('.tab-content').forEach(function (content) {
      content.classList.remove('active');
    });
    document.getElementById(tabName.toLowerCase() + '-tab').classList.add('active');

    // Load data for this tab
    loadTabData(tabName);
  }

  function refreshCurrentTab() {
    loadTabData(currentTab);
  }

  // DATA LOADING
  // ============================================================================

  function loadTabData(tabName) {
    if (tabName === 'Borrowers') {
      loadBorrowers();
    } else if (tabName === 'Media') {
      loadMedia();
    } else if (tabName === 'Loans') {
      loadLoans();
    }

  function loadBorrowers() {
    document.getElementById('borrowers-tbody').innerHTML =
      '<tr><td colspan="5" class="loading">Loading...</td></tr>';

      .withSuccessHandler(function (borrowers) {
        allBorrowers = borrowers || [];
        renderBorrowers(allBorrowers);
      })
      .withFailureHandler(handleError)
      .getActiveBorrowers();
  }

async function decompressFromServer(compressed) {
  var binaryString = atob(compressed);
  var bytes = new Uint8Array(binaryString.length);
  for (var i = 0; i < binaryString.length; i++) {
    bytes[i] = binaryString.charCodeAt(i);
  }
  var ds = new DecompressionStream('gzip');
  var writer = ds.writable.getWriter();
  writer.write(bytes);
  writer.close();
  var reader = ds.readable.getReader();
  var chunks = [];
  while (true) {
    var result = await reader.read();
    if (result.done) break;
    chunks.push(result.value);
  }
  var totalLength = chunks.reduce(function(sum, c) { return sum + c.length; }, 0);
  var merged = new Uint8Array(totalLength);
  var offset = 0;
  chunks.forEach(function(chunk) {
    merged.set(chunk, offset);
    offset += chunk.length;
  });
  return JSON.parse(new TextDecoder().decode(merged));
}

function loadMedia() {
    console.log('in loadMedia...')
    document.getElementById('media-tbody').innerHTML =
      '<tr><td colspan="5" class="loading">Loading...</td></tr>';

  google.script.run

        console.log('success', media)

        renderMedia(allMedia);
      }).catch(handleError);
    })
    .withFailureHandler(handleError)
    .getAllMedia();
}

  function loadLoans() {
    document.getElementById('loans-tbody').innerHTML =
      '<tr><td colspan="6" class="loading">Loading...</td></tr>';

    showingOverdueOnly = false;

    google.script.run

        allLoans = loans || [];
        renderLoans(allLoans);
      })
      .withFailureHandler(handleError)
      .getActiveLoans();
  }

  // ============================================================================
  // RENDERING
  // ============================================================================

  function renderBorrowers(borrowers) {
    var tbody = document.getElementById('borrowers-tbody');
    console.log({borrowers})
    if (!borrowers || borrowers.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No borrowers found</td></tr>';
      return;
    }

    tbody.innerHTML = borrowers
      .map(function (b) {
        return (
          '<tr data-id="' + b.id + '">' +
          '<td>' + escapeHtml(b.name) + '</td>' +
          '<td>' + escapeHtml(b.email) + '</td>' +
          '<td>' + escapeHtml(b.phone || '') + '</td>' +
          '<td><span class="status-badge status-' + b.status + '">' + b.status + '</span></td>' +
          '<td class="actions-cell">' +
          '<button class="btn btn-secondary" onclick="editBorrower(\'' + b.id + '\')">Edit</button>' +
          (b.status === 'active'
            ? '<button class="btn btn-danger" onclick="suspendBorrower(\'' + b.id + '\')">Suspend</button>'
            : '<button class="btn btn-secondary" onclick="activateBorrower(\'' + b.id + '\')">Activate</button>') +
          '</td>' +
          '</tr>'
        );
      })
      .join('');
  }

  function renderMedia(media) {
    var tbody = document.getElementById('media-tbody');

    if (!media || media.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No media found</td></tr>';
      return;
    }
    console.log({function: 'renderMedia', mediaLength: media.length})

          '<td>' + escapeHtml(m.title) + '</td>' +
          '<td>' + escapeHtml(m.author || '') + '</td>' +
          '<td>' + escapeHtml(m.type) + '</td>' +

          '<td class="actions-cell">' +
          '<button class="btn btn-secondary" onclick="editMedia(\'' + m.id + '\')">Edit</button>' +
          '</td>' +
          '</tr>'
        );
      })
      .join('');
  }

  function renderLoans(loans) {
    var tbody = document.getElementById('loans-tbody');

    if (!loans || loans.length === 0) {
      tbody.innerHTML =
        '<tr><td colspan="6" class="empty-state">' +
        (showingOverdueOnly ? 'No overdue loans' : 'No active loans') +
        '</td></tr>';
      return;
    }

    tbody.innerHTML = loans
      .sort((a, b) => new Date(b.dueDate).getTime() - new Date(a.dueDate).getTime())
      .map(function (l) {
        return (
          '<tr data-id="' + l.id + '">' +
          '<td>' + escapeHtml(l.borrowerName) + '</td>' +
          '<td>' + escapeHtml(l.borrowerId) + '</td>' +
          '<td>' + escapeHtml(l.title) + '</td>' +
          '<td>' + escapeHtml(l.barcode) + '</td>' +
          '<td>' + escapeHtml(l.checkoutDate) + '</td>' +
          '<td>' + escapeHtml(l.dueDate) + '</td>' +
          '<td><span class="status-badge status-' + l.status + '">' + l.status + '</span></td>' +
          '<td class="actions-cell">' +
          '<button class="btn btn-success" onclick="returnLoan(\'' + l.id + '\')">Return</button>' +
          '<button class="btn btn-secondary" onclick="extendLoan(\'' + l.id + '\')">Extend</button>' +
          '</td>' +
          '</tr>'
        );
      })
      .join('');
  }

  // SEARCH
  // ============================================================================

  function searchBorrowersUI() {
    var query = document.getElementById('borrower-search').value.trim().toLowerCase();
    if (!query) {
      renderBorrowers(allBorrowers);
      return;
    }

    var filtered = allBorrowers.filter(function (b) {
      return (
        (b.name && b.name.toLowerCase().indexOf(query) !== -1) ||
        (b.email && b.email.toLowerCase().indexOf(query) !== -1)
      );
    });
    renderBorrowers(filtered);
  }

  function clearBorrowerSearch() {
    document.getElementById('borrower-search').value = '';
    renderBorrowers(allBorrowers);
  }

  function searchMediaUI() {
    console.log('in searchMediaUI...')

    if (!query) {
      renderMedia(allMedia);
      return;
    }

    var filtered = allMedia.filter(function (m) {
      console.log(m.title)
      return (
        (m.title && `${m.title}`.toLowerCase().indexOf(query) !== -1) ||
        (m.author && m.author.toLowerCase().indexOf(query) !== -1)
      );
    });
    renderMedia(filtered);
  }

  function clearMediaSearch() {
    console.log('in clearMediaSearch...')
    document.getElementById('media-search').value = '';
    renderMedia(allMedia);
  }

    showingOverdueOnly = true;
    var filtered = allLoans.filter(function (l) {
      return l.status === 'overdue';
    });
    renderLoans(filtered);
  }

  function showAllLoans() {
    showingOverdueOnly = false;
    renderLoans(allLoans);

  function showModal(title, contentHtml) {
    document.getElementById('modal-content').innerHTML =

      '<h2>' + title + '</h2>' +
      '<button class="modal-close" onclick="closeModal()">&times;</button>' +
      '</div>' +
      '<div class="modal-body">' +
      contentHtml +
      '</div>';
    document.getElementById('modal-overlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
  }

  function closeModalOnOverlay(event) {
    if (event.target.id === 'modal-overlay') {
      closeModal();
    }
  }

  function submitBorrower(event) {
    event.preventDefault();
    showStatus('Saving...', 'loading');

    var data = {
      id: document.getElementById('b-id').value || undefined,
      name: document.getElementById('b-name').value,
      email: document.getElementById('b-email').value,
      phone: document.getElementById('b-phone').value,
      notes: document.getElementById('b-notes').value,
    };

    google.script.run
      .withSuccessHandler(function (result) {
        if (result.success) {
          showStatus('Borrower saved!', 'success');
          closeModal();
          loadBorrowers();
        } else {
          showStatus(result.error || 'Failed to save borrower', 'error');
        }
      })
      .withFailureHandler(handleError)
      .saveBorrower(data);
  }

  function suspendBorrower(id) {
    showModal(
      'Suspend Borrower',
      '<p>Are you sure you want to suspend this borrower?</p>' +
        '<div style="display:flex;gap:8px;margin-top:16px">' +
        '<button class="btn btn-danger" onclick="confirmSuspend(\'' + id + '\')">Suspend</button>' +
        '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>' +
        '</div>'
    );
  }

  function confirmSuspend(id) {
    closeModal();
    showStatus('Suspending...', 'loading');
    google.script.run
      .withSuccessHandler(function (result) {
        if (result.success) {
          showStatus('Borrower suspended', 'success');
          loadBorrowers();
        } else {
          showStatus(result.error || 'Failed to suspend', 'error');
        }
      })
      .withFailureHandler(handleError)
      .suspendBorrowerById(id);
  }

  function activateBorrower(id) {
    showStatus('Activating...', 'loading');
    google.script.run
      .withSuccessHandler(function (result) {
        if (result.success) {
          showStatus('Borrower activated', 'success');
          loadBorrowers();
        } else {
          showStatus(result.error || 'Failed to activate', 'error');
        }
      })
      .withFailureHandler(handleError)
      .activateBorrowerById(id);
  }

  var borrowerSearchTimeout = null;

  function setupBorrowerAutocomplete() {
    var input = document.getElementById('c-borrower-search');
    input.addEventListener('input', function () {
      var query = input.value.trim();
      document.getElementById('c-borrower').value = '';

      clearTimeout(borrowerSearchTimeout);
      if (query.length < 2) {
        document.getElementById('c-borrower-results').innerHTML = '';
        return;
      }

      borrowerSearchTimeout = setTimeout(function () {
        document.getElementById('c-borrower-results').innerHTML =
          '<div class="autocomplete-item loading">Searching...</div>';

        google.script.run
          .withSuccessHandler(function (results) {
            var container = document.getElementById('c-borrower-results');
            if (!results || results.length === 0) {
              container.innerHTML = '<div class="autocomplete-item">No matches found</div>';
              return;
            }
            var active = results.filter(function (b) { return b.status === 'active'; });
            if (active.length === 0) {
              container.innerHTML = '<div class="autocomplete-item">No active borrowers match</div>';
              return;
            }
            container.innerHTML = active.slice(0, 20).map(function (b) {
              return '<div class="autocomplete-item" onclick="selectBorrower(\'' +
                escapeAttr(b.id) + '\', \'' +
                escapeAttr(b.name) + '\', \'' +
                escapeAttr(b.email) + '\')">' +
                escapeHtml(b.name) + ' <span class="author">(' +
                escapeHtml(b.email) + ')</span></div>';
            }).join('');
          })
          .withFailureHandler(function () {
            document.getElementById('c-borrower-results').innerHTML =
              '<div class="autocomplete-item">Search failed — try again</div>';
          })
          .searchBorrowers(query);
      }, 300);
    });
  }

  function selectBorrower(id, name, email) {
    document.getElementById('c-borrower').value = id;
    document.getElementById('c-borrower-name').value = name;
    document.getElementById('c-borrower-search').value = name + ' (' + email + ')';
    document.getElementById('c-borrower-results').innerHTML = '';
  }

  var mediaSearchTimeout = null;

  function setupMediaAutocomplete() {
    var input = document.getElementById('c-media-search');
    input.addEventListener('input', function () {
      var query = input.value.trim();
      document.getElementById('c-media').value = '';

      clearTimeout(mediaSearchTimeout);
      if (query.length < 2) {
        document.getElementById('c-media-results').innerHTML = '';
        return;
      }

      mediaSearchTimeout = setTimeout(function () {
        document.getElementById('c-media-results').innerHTML =
          '<div class="autocomplete-item loading">Searching...</div>';

        google.script.run
          .withSuccessHandler(function (results) {
            console.log(results.slice(0, 5))
            var container = document.getElementById('c-media-results');
            if (!results || results.length === 0) {
              container.innerHTML = '<div class="autocomplete-item">No matches found</div>';
              return;
            }
            container.innerHTML = results.slice(0, 20).map(function (m) {
              return '<div class="autocomplete-item" onclick="selectMedia(\'' +
                escapeAttr(m.id) + '\', \'' +
                escapeAttr(m.barcode) + '\', \'' +
                escapeAttr(m.title) + '\')">' +
                escapeAttr(m.barcode) + ' | ' + escapeHtml(m.title) + '</div>';
            }).join('');
          })
          .withFailureHandler(function () {
            document.getElementById('c-media-results').innerHTML =
              '<div class="autocomplete-item">Search failed — try again</div>';
          })
          .searchMedia(query);
      }, 300);
    });
  }

  function selectMedia(id, barcode, title) {
    document.getElementById('c-media').value = id;
    document.getElementById('c-media-name').value = title;
    document.getElementById('c-media-barcode').value = barcode;
    document.getElementById('c-media-search').value = `${barcode} | ${title}`;
    document.getElementById('c-media-results').innerHTML = '';
  }

  function submitCheckout(event) {
    event.preventDefault();
    showStatus('Processing checkout...', 'loading');

    var borrowerId = document.getElementById('c-borrower').value;
    var borrowerName = document.getElementById('c-borrower-name').value;
    var barcode = document.getElementById('c-media-barcode').value;
    var title = document.getElementById('c-media-name').value;
    var days = parseInt(document.getElementById('c-days').value) || 14;
    var resourceId = document.getElementById('c-media').value;

    google.script.run
      .withSuccessHandler(function (result) {
        if (result.success) {
          showStatus('Checkout complete!', 'success');
          closeModal();
          loadLoans();
          loadMedia(); // Refresh media to update availability
        } else {
          showStatus(result.error || 'Checkout failed', 'error');
        }
      })
      .withFailureHandler(handleError)
      .processCheckout(borrowerId, barcode, resourceId, title, borrowerName, days);
  }

  function returnLoan(id) {
    showModal(
      'Return Item',
      '<p>Mark this item as returned?</p>' +
        '<div style="display:flex;gap:8px;margin-top:16px">' +
        '<button class="btn btn-success" onclick="confirmReturn(\'' + id + '\')">Confirm Return</button>' +
        '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>' +
        '</div>'
    );
  }

  function confirmReturn(id) {
    closeModal();
    showStatus('Processing return...', 'loading');
    google.script.run
      .withSuccessHandler(function (result) {
        if (result.success) {
          showStatus('Return processed!', 'success');
          loadLoans();
          loadMedia();
        } else {
          showStatus(result.error || 'Return failed', 'error');
        }
      })
      .withFailureHandler(handleError)
      .returnLoanById(id);
  }

  function extendLoan(id) {
    showModal(
      'Extend Loan',
      '<form id="extend-form" onsubmit="submitExtendLoan(event, \'' + id + '\')">' +
        '<div class="form-group">' +
        '<label for="extend-days">Extend by how many days?</label>' +
        '<input type="number" id="extend-days" value="7" min="1" max="90" required>' +
        '</div>' +
        '<button type="submit" class="btn btn-primary">Extend</button>' +
        '</form>'
    );
  }

  function submitExtendLoan(event, id) {
    event.preventDefault();
    var daysNum = parseInt(document.getElementById('extend-days').value);
    if (isNaN(daysNum) || daysNum < 1) {
      showStatus('Please enter a valid number of days', 'error');
      return;
    }
    closeModal();
    showStatus('Extending loan...', 'loading');
    google.script.run
      .withSuccessHandler(function (result) {
        if (result.success) {
          showStatus('Loan extended!', 'success');
          loadLoans();
        } else {
          showStatus(result.error || 'Extension failed', 'error');
        }
      })
      .withFailureHandler(handleError)
      .extendLoan(id, daysNum);
  }

  // ============================================================================
  // UTILITY FUNCTIONS
  // ============================================================================

  function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function escapeAttr(text) {
    if (typeof text == 'number') return text;
    if (!text || typeof text !== 'string') return '';
    return text.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function showStatus(message, type) {
    var statusArea = document.getElementById('status-area');
    statusArea.textContent = message;
    statusArea.className = 'status-area ' + type;

    if (type !== 'loading') {
      setTimeout(function () {
        statusArea.className = 'status-area';
      }, 3000);
    }
  }

  function handleError(error) {
    console.log('in handleError...')
    showStatus(error.message || 'An error occurred', 'error');
    console.error(error);
  }
</script>
