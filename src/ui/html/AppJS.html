<script>
  /**
   * CCB Admin Web App - Client-side JavaScript
   */

  let currentTab = 'Circulation';
  let allBorrowers = [];
  let allMedia = [];
  let allLoans = [];
  let allBarcodes = [];
  let showingOverdueOnly = false;
  let lastBorrowerQuery = '';
  let borrowerSort = { key: 'name', dir: 'asc' };
  let classificationOptions = [];
  const UNCLASSIFIED_VALUE = '__UNCLASSIFIED__';

  // ============================================================================
  // BUSY CURSOR — wraps google.script.run so the cursor signals pending work
  // ============================================================================

  var busyCursor;
  (function instrumentGoogleScriptRun() {
    var pending = 0;
    var showTimer = null;

    function start() {
      pending++;
      if (showTimer || document.body.classList.contains('busy')) return;
      // Only show the wait cursor if the call is slow enough to notice (200ms),
      // so quick calls don't cause a cursor flicker.
      showTimer = setTimeout(function () {
        showTimer = null;
        if (pending > 0) document.body.classList.add('busy');
      }, 200);
    }

    function stop() {
      pending = Math.max(0, pending - 1);
      if (pending > 0) return;
      if (showTimer) {
        clearTimeout(showTimer);
        showTimer = null;
      }
      document.body.classList.remove('busy');
    }

    // Exposed for callers that wait on a `.quiet()` request — they can drive
    // the cursor manually once the user is actually blocked on the result.
    busyCursor = { start: start, stop: stop };

    var realRun = google.script.run;

    function wrap(opts) {
      return new Proxy({}, {
        get: function (_, prop) {
          if (typeof prop !== 'string') return undefined;
          if (prop === 'withSuccessHandler') {
            return function (fn) {
              return wrap(Object.assign({}, opts, { onSuccess: fn }));
            };
          }
          if (prop === 'withFailureHandler') {
            return function (fn) {
              return wrap(Object.assign({}, opts, { onFailure: fn }));
            };
          }
          if (prop === 'withUserObject' || prop === 'withLogger') {
            return function () { return wrap(opts); };
          }
          if (prop === 'quiet') {
            // Opt out of the busy cursor for background prefetches.
            return function () { return wrap(Object.assign({}, opts, { quiet: true })); };
          }
          // Terminal call — `prop` is the server function name.
          return function () {
            var quiet = !!opts.quiet;
            if (!quiet) start();
            var done = false;
            function finish() {
              if (done) return;
              done = true;
              if (!quiet) stop();
            }
            // Safety net: a request that never returns shouldn't strand the cursor.
            setTimeout(finish, 60000);

            var args = arguments;
            var rr = realRun
              .withSuccessHandler(function () {
                finish();
                if (opts.onSuccess) opts.onSuccess.apply(null, arguments);
              })
              .withFailureHandler(function () {
                finish();
                if (opts.onFailure) opts.onFailure.apply(null, arguments);
              });
            return rr[prop].apply(rr, args);
          };
        }
      });
    }

    Object.defineProperty(google.script, 'run', {
      get: function () { return wrap({}); },
      configurable: true
    });
  })();

  // ============================================================================
  // INITIALIZATION
  // ============================================================================

  document.addEventListener('DOMContentLoaded', function () {
    google.script.run
      .withSuccessHandler(function (context) {
        document.getElementById('user-email').textContent = context.userEmail;
        loadTabData(currentTab);
      })
      .withFailureHandler(handleError)
      .getAppContext();
    loadClassifications();
  });

  function loadClassifications() {
    google.script.run
      .withSuccessHandler(function (classifications) {
        classificationOptions = classifications || [];
        var select = document.getElementById('media-classification');
        if (!select) return;
        for (var i = 0; i < classificationOptions.length; i++) {
          var opt = document.createElement('option');
          opt.value = classificationOptions[i].value;
          opt.textContent = classificationOptions[i].label;
          select.appendChild(opt);
        }
        // Browse-only pseudo-classification: everything matching none of the curated
        // entries. Kept out of classificationOptions so it never appears in the edit modal.
        var unclassified = document.createElement('option');
        unclassified.value = UNCLASSIFIED_VALUE;
        unclassified.textContent = 'Unclassified / Other';
        select.appendChild(unclassified);
      })
      .withFailureHandler(handleError)
      .quiet()
      .getClassifications();
  }

  // Client-side mirror of the server's classificationMatches(): prefix-flagged
  // entries match by prefix, the rest are case-insensitive exact matches.
  function classificationMatches(itemClassification, value) {
    var item = (itemClassification || '').trim().toLowerCase();
    var sel = (value || '').trim().toLowerCase();
    if (!sel) return true;
    var opt = classificationOptions.find(function (c) { return c.value.toLowerCase() === sel; });
    if (opt && opt.prefix) return item.indexOf(sel) === 0;
    return item === sel;
  }

  // Builds the <select id="m-classification"> for the resource modal. Pre-selects
  // the curated entry that matches `currentValue` (exact or prefix). If nothing
  // matches, the existing value is preserved as a selected "… (current)" option so
  // saving doesn't clobber it. The original value rides along in a hidden input.
  function renderClassificationSelectHtml(currentValue) {
    var cur = currentValue || '';
    var matched = null;
    for (var i = 0; i < classificationOptions.length; i++) {
      if (classificationMatches(cur, classificationOptions[i].value)) {
        matched = classificationOptions[i];
        break;
      }
    }
    var html = '<select id="m-classification">';
    html += '<option value=""' + (!cur ? ' selected' : '') + '>(none)</option>';
    if (cur && !matched) {
      html += '<option value="' + escapeAttr(cur) + '" selected>' + escapeHtml(cur) + ' (current)</option>';
    }
    for (var j = 0; j < classificationOptions.length; j++) {
      var o = classificationOptions[j];
      var sel = (matched && o.value === matched.value) ? ' selected' : '';
      html += '<option value="' + escapeAttr(o.value) + '"' + sel + '>' + escapeHtml(o.label) + '</option>';
    }
    html += '</select>';
    html += '<input type="hidden" id="m-classification-original" value="' + escapeAttr(cur) + '">';
    return html;
  }

  // ============================================================================
  // TAB SWITCHING
  // ============================================================================

  function switchTab(tabName) {
    currentTab = tabName;

    // Update tab buttons
    document.querySelectorAll('.tab-btn').forEach(function (btn) {
      btn.classList.toggle('active', btn.dataset.tab === tabName.toLowerCase());
    });

    // Update tab content
    document.querySelectorAll('.tab-content').forEach(function (content) {
      content.classList.remove('active');
    });
    document.getElementById(tabName.toLowerCase() + '-tab').classList.add('active');

    // Load data for this tab
    loadTabData(tabName);
  }

  function refreshCurrentTab() {
    loadTabData(currentTab);
  }

  // ============================================================================
  // DATA LOADING
  // ============================================================================

  function loadTabData(tabName) {
    if (tabName === 'Circulation') {
      prewarmBarcodes();
    } else if (tabName === 'Borrowers') {
      loadBorrowers();
    } else if (tabName === 'Media') {
      document.getElementById('media-tbody').innerHTML =
        '<tr><td colspan="5" class="empty-state">Enter a search term or pick a classification or status to find resources</td></tr>';
    } else if (tabName === 'Loans') {
      loadLoans();
    }
  }

  // Loads the full member roster once (the Members tab shows everyone by
  // default). Name/email search then filters this list locally — no server
  // round-trip. The current search box value is preserved across reloads.
  function loadBorrowers() {
    document.getElementById('borrowers-tbody').innerHTML =
      '<tr><td colspan="6" class="loading">Loading...</td></tr>';
    google.script.run
      .withSuccessHandler(function (results) {
        allBorrowers = results || [];
        applyBorrowerFilter();
      })
      .withFailureHandler(handleError)
      .getAllBorrowers();
  }

  // Renders the roster filtered by the search box (name or email, substring,
  // case-insensitive) entirely client-side.
  function applyBorrowerFilter() {
    var query = document.getElementById('borrower-search').value.trim().toLowerCase();
    lastBorrowerQuery = query;
    if (!query) {
      renderBorrowers(allBorrowers);
      return;
    }
    var filtered = allBorrowers.filter(function (b) {
      return (b.name || '').toLowerCase().indexOf(query) !== -1 ||
             (b.email || '').toLowerCase().indexOf(query) !== -1;
    });
    renderBorrowers(filtered);
  }

  function loadLoans() {
    document.getElementById('loans-tbody').innerHTML =
      '<tr><td colspan="6" class="loading">Loading...</td></tr>';

    showingOverdueOnly = false;

    google.script.run
      .withSuccessHandler(function (loans) {
        allLoans = loans || [];
        renderLoans(allLoans);
      })
      .withFailureHandler(handleError)
      .getActiveLoans();
  }

  // ============================================================================
  // RENDERING
  // ============================================================================

  function renderBorrowers(borrowers) {
    var tbody = document.getElementById('borrowers-tbody');
    updateSortIndicators();
    if (!borrowers || borrowers.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No members found</td></tr>';
      return;
    }

    tbody.innerHTML = borrowers
      .slice().sort(compareBorrowers)
      .map(function (b) {
        var expired = b.status === 'expired';
        var rowClass = expired ? ' class="row-expired"' : '';
        var badgeClass = expired ? 'status-inactive' : 'status-active';
        var badgeText = expired ? 'expired' : 'active';
        return (
          '<tr' + rowClass + ' data-id="' + b.id + '">' +
          '<td>' + escapeHtml(b.name) + '</td>' +
          '<td>' + escapeHtml(b.email) + '</td>' +
          '<td>' + escapeHtml(b.phone || '') + '</td>' +
          '<td>' + escapeHtml(b.expiryDate || '') + '</td>' +
          '<td><span class="status-badge ' + badgeClass + '">' + badgeText + '</span></td>' +
          '<td class="actions-cell">' +
          '<button class="btn btn-secondary" onclick="editBorrower(\'' + b.id + '\')">Edit</button>' +
          '</td>' +
          '</tr>'
        );
      })
      .join('');
  }

  // Parses an expiry-date string to a sortable timestamp; blank/invalid dates
  // sort to the end (largest value) regardless of direction's intent.
  function parseDateValue(s) {
    if (!s) return Number.POSITIVE_INFINITY;
    var t = new Date(s).getTime();
    return isNaN(t) ? Number.POSITIVE_INFINITY : t;
  }

  function compareBorrowers(a, b) {
    var dir = borrowerSort.dir === 'desc' ? -1 : 1;
    if (borrowerSort.key === 'expiryDate') {
      var ta = parseDateValue(a.expiryDate);
      var tb = parseDateValue(b.expiryDate);
      if (ta !== tb) return (ta < tb ? -1 : 1) * dir;
      return (a.name || '').localeCompare(b.name || '');
    }
    return (a.name || '').localeCompare(b.name || '') * dir;
  }

  function sortBorrowers(key) {
    if (borrowerSort.key === key) {
      borrowerSort.dir = borrowerSort.dir === 'asc' ? 'desc' : 'asc';
    } else {
      borrowerSort.key = key;
      borrowerSort.dir = 'asc';
    }
    // Re-apply the active search filter so sorting doesn't discard it.
    applyBorrowerFilter();
  }

  function updateSortIndicators() {
    var arrow = borrowerSort.dir === 'asc' ? '▲' : '▼';
    setSortIndicator('#th-sort-name .sort-indicator', borrowerSort.key === 'name', arrow);
    setSortIndicator('#th-sort-expiry .sort-indicator', borrowerSort.key === 'expiryDate', arrow);
  }

  // Active column gets the direction arrow in accent color; inactive sortable
  // columns still show a muted up/down glyph so it's clear they can be sorted.
  function setSortIndicator(selector, active, arrow) {
    var el = document.querySelector(selector);
    if (!el) return;
    el.textContent = active ? arrow : '⇵';
    el.className = 'sort-indicator' + (active ? ' active' : '');
  }

  function renderMedia(media) {
    var tbody = document.getElementById('media-tbody');

    if (!media || media.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No resources found</td></tr>';
      return;
    }
    console.log({function: 'renderMedia', mediaLength: media.length})
    tbody.innerHTML = media
      .slice().sort((a, b) => `${a.title}`.localeCompare(`${b.title}`))
      .map(function (m) {
        return (
          '<tr data-id="' + m.id + '">' +
          '<td>' + escapeHtml(m.title) + '</td>' +
          '<td>' + escapeHtml(m.author || '') + '</td>' +
          '<td>' + escapeHtml(m.type) + '</td>' +
          '<td><span class="status-badge status-' + m.status + '">' + m.status + '</span></td>' +
          '<td class="actions-cell">' +
          '<button class="btn btn-secondary" onclick="editMedia(\'' + m.id + '\')">Edit</button>' +
          '</td>' +
          '</tr>'
        );
      })
      .join('');
  }

  function renderLoans(loans) {
    var tbody = document.getElementById('loans-tbody');

    if (!loans || loans.length === 0) {
      tbody.innerHTML =
        '<tr><td colspan="6" class="empty-state">' +
        (showingOverdueOnly ? 'No overdue loans' : 'No active loans') +
        '</td></tr>';
      return;
    }

    var today = new Date();
    today.setHours(0, 0, 0, 0);
    tbody.innerHTML = loans
      .sort((a, b) => new Date(b.dueDate).getTime() - new Date(a.dueDate).getTime())
      .map(function (l) {
        var status = new Date(l.dueDate) < today ? 'overdue' : 'active';
        return (
          '<tr data-id="' + l.id + '">' +
          '<td>' + escapeHtml(l.borrowerName) + '</td>' +
          '<td>' + escapeHtml(l.borrowerId) + '</td>' +
          '<td>' + escapeHtml(l.title) + '</td>' +
          '<td>' + escapeHtml(l.barcode) + '</td>' +
          '<td>' + escapeHtml(l.checkoutDate) + '</td>' +
          '<td>' + escapeHtml(l.dueDate) + '</td>' +
          '<td><span class="status-badge status-' + status + '">' + status + '</span></td>' +
          '</tr>'
        );
      })
      .join('');
  }

  // ============================================================================
  // SEARCH
  // ============================================================================

  function searchBorrowersUI() {
    applyBorrowerFilter();
  }

  function clearBorrowerSearch() {
    document.getElementById('borrower-search').value = '';
    applyBorrowerFilter();
  }

  function searchMediaUI() {
    var query = document.getElementById('media-search').value.trim();
    var classification = document.getElementById('media-classification').value;
    var status = document.getElementById('media-status').value;
    if (!query && !classification && !status) {
      document.getElementById('media-tbody').innerHTML =
        '<tr><td colspan="5" class="empty-state">Enter a search term or pick a classification or status to find resources</td></tr>';
      return;
    }
    document.getElementById('media-tbody').innerHTML =
      '<tr><td colspan="5" class="loading">Searching...</td></tr>';
    google.script.run
      .withSuccessHandler(function (results) {
        allMedia = results || [];
        renderMedia(allMedia);
      })
      .withFailureHandler(handleError)
      .searchAllMedia(query, classification, status);
  }

  function clearMediaSearch() {
    document.getElementById('media-search').value = '';
    document.getElementById('media-classification').value = '';
    document.getElementById('media-status').value = '';
    allMedia = [];
    document.getElementById('media-tbody').innerHTML =
      '<tr><td colspan="5" class="empty-state">Enter a search term or pick a classification or status to find resources</td></tr>';
  }

  function showOverdueOnly() {
    showingOverdueOnly = true;
    var today = new Date();
    today.setHours(0, 0, 0, 0);
    var filtered = allLoans.filter(function (l) {
      return new Date(l.dueDate) < today;
    });
    renderLoans(filtered);
  }

  function showAllLoans() {
    showingOverdueOnly = false;
    renderLoans(allLoans);
  }

  // ============================================================================
  // MODAL FUNCTIONS
  // ============================================================================

  function showModal(title, contentHtml) {
    document.getElementById('modal-content').innerHTML =
      '<div class="modal-header">' +
      '<h2>' + title + '</h2>' +
      '<button class="modal-close" onclick="closeModal()">&times;</button>' +
      '</div>' +
      '<div class="modal-body">' +
      contentHtml +
      '</div>';
    document.getElementById('modal-overlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
  }

  function closeModalOnOverlay(event) {
    if (event.target.id === 'modal-overlay') {
      closeModal();
    }
  }

  // In-app confirm/alert dialogs (replaces native confirm()/alert(), which in a
  // sandboxed iframe render an ugly "An embedded page at … says" prompt).
  function showConfirm(title, message, confirmLabel, onConfirm) {
    document.getElementById('dialog-content').innerHTML =
      '<div class="modal-header"><h2>' + escapeHtml(title) + '</h2>' +
      '<button class="modal-close" onclick="closeDialog()">&times;</button></div>' +
      '<div class="modal-body">' +
      '<p style="margin:0 0 20px">' + escapeHtml(message) + '</p>' +
      '<div style="display:flex;gap:8px;justify-content:flex-end">' +
      '<button class="btn btn-secondary" onclick="closeDialog()">Cancel</button>' +
      '<button class="btn btn-danger" id="dialog-confirm-btn">' + escapeHtml(confirmLabel || 'OK') + '</button>' +
      '</div></div>';
    document.getElementById('dialog-overlay').classList.add('active');
    document.getElementById('dialog-confirm-btn').onclick = function () {
      closeDialog();
      if (onConfirm) onConfirm();
    };
  }

  function showAlert(title, message) {
    document.getElementById('dialog-content').innerHTML =
      '<div class="modal-header"><h2>' + escapeHtml(title) + '</h2>' +
      '<button class="modal-close" onclick="closeDialog()">&times;</button></div>' +
      '<div class="modal-body">' +
      '<p style="margin:0 0 20px">' + escapeHtml(message) + '</p>' +
      '<div style="display:flex;justify-content:flex-end">' +
      '<button class="btn btn-primary" onclick="closeDialog()">OK</button>' +
      '</div></div>';
    document.getElementById('dialog-overlay').classList.add('active');
  }

  function closeDialog() {
    document.getElementById('dialog-overlay').classList.remove('active');
  }

  function closeDialogOnOverlay(event) {
    if (event.target.id === 'dialog-overlay') {
      closeDialog();
    }
  }

  // ============================================================================
  // BORROWER ACTIONS
  // ============================================================================

  function formatDate(date) {
    return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function showAddBorrowerModal() {
    var today = new Date();
    var nextYear = new Date(today);
    nextYear.setFullYear(nextYear.getFullYear() + 1);
    showModal(
      'Add Member',
      '<form id="borrower-form" onsubmit="submitBorrower(event)">' +
        '<div class="form-group"><label for="b-name">Name *</label><input type="text" id="b-name" required title="Full name of the member"></div>' +
        '<div class="form-group"><label for="b-email">Email *</label><input type="email" id="b-email" required title="Email address used for login and contact"></div>' +
        '<div class="form-group"><label for="b-phone">Phone</label><input type="text" id="b-phone" title="Contact phone number"></div>' +
        '<div class="form-group"><label for="b-gender">Gender</label><input type="text" id="b-gender"></div>' +
        '<div class="form-group"><label for="b-address">Address</label><input type="text" id="b-address"></div>' +
        '<div class="form-group"><label for="b-postcode">Postcode</label><input type="text" id="b-postcode"></div>' +
        '<div class="form-group"><label for="b-borrowerType">Member Type</label><input type="text" id="b-borrowerType" title="e.g. Adult, Child, Senior, Staff"></div>' +
        '<div class="form-group"><label for="b-expiryDate">Expiry Date *</label><input type="text" id="b-expiryDate" value="' + formatDate(nextYear) + '" required title="Date when this membership expires"></div>' +
        '<div class="form-group"><label for="b-memberSince">Member Since *</label><input type="text" id="b-memberSince" value="' + formatDate(today) + '" required title="Date when the member first joined"></div>' +
        '<input type="hidden" id="b-id" value="">' +
        '<button type="submit" class="btn btn-primary">Save Member</button>' +
        '</form>'
    );
  }

  function editBorrower(id) {
    var borrower = allBorrowers.find(function (b) {
      return b.id === id;
    });
    if (!borrower) {
      showStatus('Borrower not found', 'error');
      return;
    }

    showModal(
      'Edit Member',
      '<form id="borrower-form" onsubmit="submitBorrower(event)">' +
        '<div class="form-group">' +
        '<label for="b-name">Name *</label>' +
        '<input type="text" id="b-name" required value="' + escapeAttr(borrower.name || '') + '">' +
        '</div>' +
        '<div class="form-group">' +
        '<label for="b-email">Email *</label>' +
        '<input type="email" id="b-email" required value="' + escapeAttr(borrower.email || '') + '">' +
        '</div>' +
        '<div class="form-group">' +
        '<label for="b-phone">Phone</label>' +
        '<input type="text" id="b-phone" value="' + escapeAttr(borrower.phone || '') + '">' +
        '</div>' +
      '<div class="form-group">' +
      '<label for="b-gender">Gender</label>' +
      '<input type="text" id="b-gender" value="' + escapeAttr(borrower.gender || '') + '">' +
      '</div>' +
      '<div class="form-group">' +
      '<label for="b-address">Address</label>' +
      '<input type="text" id="b-address" value="' + escapeAttr(borrower.address || '') + '">' +
      '</div>' +
      '<div class="form-group">' +
      '<label for="b-postcode">Postcode</label>' +
      '<input type="text" id="b-postcode" value="' + escapeAttr(borrower.postcode || '') + '">' +
      '</div>' +
      '<div class="form-group">' +
      '<label for="b-borrowerType">Member Type</label>' +
      '<input type="text" id="b-borrowerType" value="' + escapeAttr(borrower.borrowerType || '') + '">' +
      '</div>' +
      '<div class="form-group">' +
      '<label for="b-expiryDate">Expiry Date</label>' +
      '<input type="text" id="b-expiryDate" value="' + escapeAttr(borrower.expiryDate || '') + '">' +
      '</div>' +
      '<div class="form-group">' +
      '<label for="b-memberSince">Member Since</label>' +
      '<input type="text" id="b-memberSince" value="' + escapeAttr(borrower.memberSince || '') + '">' +
      '</div>' +
        '<input type="hidden" id="b-id" value="' + borrower.id + '">' +
        '<button type="submit" class="btn btn-primary">Save Member</button>' +
        '</form>'
    );
  }

  function submitBorrower(event) {
    event.preventDefault();
    var saveBtn = event.submitter || event.target.querySelector('button[type="submit"]');
    setButtonLoading(saveBtn, 'Saving…');

    var data = {
      id: document.getElementById('b-id').value || undefined,
      name: document.getElementById('b-name').value,
      email: document.getElementById('b-email').value,
      phone: document.getElementById('b-phone').value,
      gender: document.getElementById('b-gender').value,
      address: document.getElementById('b-address').value,
      postcode: document.getElementById('b-postcode').value,
      borrowerType: document.getElementById('b-borrowerType').value,
      expiryDate: document.getElementById('b-expiryDate').value,
      memberSince: document.getElementById('b-memberSince').value,
    };

    google.script.run
      .withSuccessHandler(function (result) {
        if (result.success) {
          showStatus('Member saved!', 'success');
          closeModal();
          // Re-fetch the roster (data changed); the current search filter is
          // preserved because loadBorrowers re-applies the search box value.
          loadBorrowers();
        } else {
          restoreButton(saveBtn);
          showAlert('Unable to save', result.error || 'Failed to save member');
        }
      })
      .withFailureHandler(function (error) {
        restoreButton(saveBtn);
        handleError(error);
      })
      .saveBorrower(data);
  }


  // ============================================================================
  // MEDIA ACTIONS
  // ============================================================================

  function generateBarcode() {
    var d1 = Array.from({length: 5}, function() { return Math.floor(Math.random() * 10); }).join('');
    var letter = String.fromCharCode(65 + Math.floor(Math.random() * 26));
    var d2 = Array.from({length: 4}, function() { return Math.floor(Math.random() * 10); }).join('');
    return 'R' + d1 + letter + d2;
  }

  function splitBarcodes(raw) {
    if (!raw) return [];
    return String(raw).split('|').map(function (b) { return b.trim(); }).filter(Boolean);
  }

  function parseResourceBox(raw) {
    if (!raw) return {};
    try {
      var parsed = JSON.parse(raw);
      return (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) ? parsed : {};
    } catch (e) {
      return {};
    }
  }

  function findBoxContents(ownBarcodes, ownId) {
    if (!ownBarcodes.length) return [];
    var set = {};
    ownBarcodes.forEach(function (b) { set[b] = true; });
    var contents = [];
    allMedia.forEach(function (m) {
      if (ownId && m.id == ownId) return;
      var mapping = parseResourceBox(m.resourceBox);
      Object.keys(mapping).forEach(function (childBarcode) {
        if (set[mapping[childBarcode]]) {
          contents.push({ title: m.title, childBarcode: childBarcode, boxBarcode: mapping[childBarcode] });
        }
      });
    });
    return contents;
  }

  function renderBoxRowsHtml(barcodes, mapping) {
    if (!barcodes.length) {
      return '<div class="form-help" style="color:#6b7280;font-size:0.9em">Enter at least one barcode above to assign this resource to a box.</div>';
    }
    var showLabel = barcodes.length > 1;
    return barcodes.map(function (bc) {
      var val = (mapping && mapping[bc]) || '';
      var labelHtml = showLabel
        ? '<span style="min-width:140px;font-family:monospace;font-size:0.9em">' + escapeHtml(bc) + '</span>'
        : '';
      return '<div class="box-row" style="display:flex;align-items:center;gap:8px;margin-bottom:6px">' +
        labelHtml +
        '<input type="text" class="box-row-input" data-barcode="' + escapeAttr(bc) + '" value="' + escapeAttr(val) + '" placeholder="Scan box barcode (blank if standalone)" style="flex:1">' +
        '</div>';
    }).join('');

  function renderBoxContentsHtml(contents, showBoxBarcode) {
    if (!contents.length) return '';
    var rows = contents.map(function (c) {
      var detail = showBoxBarcode
        ? escapeHtml(c.childBarcode) + ' → ' + escapeHtml(c.boxBarcode)
        : escapeHtml(c.childBarcode);
      return '<li>' + escapeHtml(c.title) + ' <span style="color:#6b7280;font-family:monospace;font-size:0.9em">(' + detail + ')</span></li>';
    }).join('');
    return '<div class="form-group">' +

      '<ul style="margin:0;padding-left:20px;color:#374151">' + rows + '</ul>' +

  var borrowerSearchTimeout = null;

  // ============================================================================
  // CIRCULATION DESK
  // ============================================================================

  // Barcode prewarm runs in the background — no busy cursor until a caller
  // actually needs the list. State: 'idle' | 'loading' | 'ready'. Once 'ready',
  // subsequent prewarm calls refresh the list in the background without
  // flipping state, so the typeahead keeps using the cached data and never
  // re-queues a busy-cursor wait.
  var barcodesState = 'idle';
  var barcodesInFlight = false;
  var barcodesWaiters = [];

  function prewarmBarcodes() {
    if (barcodesInFlight) return;
    barcodesInFlight = true;
    if (barcodesState === 'idle') barcodesState = 'loading';
    var startedAt = Date.now();
    console.log('[barcodes] requesting all barcodes from server...');
    google.script.run
      .withSuccessHandler(function (barcodes) {
        allBarcodes = barcodes || [];
        console.log('[barcodes] received ' + allBarcodes.length + ' barcodes in ' + (Date.now() - startedAt) + 'ms');
        barcodesInFlight = false;
        barcodesState = 'ready';
        flushBarcodeWaiters();
      })
      .withFailureHandler(function (err) {
        console.warn('[barcodes] pre-warm failed after ' + (Date.now() - startedAt) + 'ms', err);
        barcodesInFlight = false;
        if (barcodesState === 'loading') {
          allBarcodes = [];
          barcodesState = 'ready';
        }
        flushBarcodeWaiters();
      })
      .quiet()
      .getAllBarcodes();
  }

  function flushBarcodeWaiters() {
    var waiters = barcodesWaiters;
    barcodesWaiters = [];
    waiters.forEach(function (fn) {
      try { fn(); } catch (e) { console.error(e); }
    });
  }

  function findUniqueBarcodeMatch(prefix) {
    if (!prefix || prefix.length < 6 || !allBarcodes || !allBarcodes.length) return null;
    var match = null;
    for (var i = 0; i < allBarcodes.length; i++) {
      var bc = allBarcodes[i];
      if (bc.length >= prefix.length && bc.indexOf(prefix) === 0) {
        if (match !== null) return null;
        match = bc;
      }
    }
    return match;
  }

  function attachBarcodeTypeahead(fieldId, submitFn) {
    var field = document.getElementById(fieldId);
    if (!field) return;
    var timer = null;
    var waiterPending = false;

    function tryMatch() {
      if (field.disabled) return;
      var current = field.value.trim();
      if (!current) return;
      var match = findUniqueBarcodeMatch(current);
      if (match) {
        if (field.value !== match) field.value = match;
        submitFn();
      }
    }

    field.addEventListener('input', function () {
      if (timer) clearTimeout(timer);
      timer = setTimeout(function () {
        if (field.disabled) return;
        if (!field.value.trim()) return;
        if (barcodesState !== 'ready') {
          // User is actively waiting on us now — show the cursor until the
          // prewarm finishes, then retry against the current field value.
          if (waiterPending) return;
          waiterPending = true;
          busyCursor.start();
          barcodesWaiters.push(function () {
            waiterPending = false;
            busyCursor.stop();
            tryMatch();
          });
          return;
        }
        tryMatch();
      }, 200);
    });
  }

  function setupCirculationMemberAutocomplete() {
    var input = document.getElementById('co-member-search');
    input.addEventListener('input', function () {
      var query = input.value.trim();
      document.getElementById('co-member-id').value = '';
      clearTimeout(borrowerSearchTimeout);
      if (query.length < 2) {
        document.getElementById('co-member-results').innerHTML = '';
        return;
      }
      borrowerSearchTimeout = setTimeout(function () {
        document.getElementById('co-member-results').innerHTML =
          '<div class="autocomplete-item loading">Searching...</div>';
        google.script.run
          .withSuccessHandler(function (results) {
            var container = document.getElementById('co-member-results');
            if (!container) return;
            if (!results || results.length === 0) {
              container.innerHTML = '<div class="autocomplete-item">No matches found</div>';
              return;
            }
            container.innerHTML = results.slice(0, 20).map(function (b) {
              var expired = b.status === 'expired';
              var itemClass = 'autocomplete-item' + (expired ? ' expired' : '');
              var badge = expired
                ? ' <span class="status-badge status-inactive" style="margin-left:6px">expired</span>'
                : '';
              return '<div class="' + itemClass + '" onclick="selectCirculationMember(\'' +
                escapeAttr(b.id) + '\',\'' + escapeAttr(b.name) + '\',\'' + escapeAttr(b.email) + '\')">' +
                escapeHtml(b.name) + badge + ' <span class="author">(' + escapeHtml(b.email) + ')</span></div>';
            }).join('');
          })
          .withFailureHandler(function () {
            var container = document.getElementById('co-member-results');
            if (container) container.innerHTML = '<div class="autocomplete-item">Search failed — try again</div>';
          })
          .searchBorrowers(query);
      }, 300);
    });
  }

  function processCirculationCheckout() {

    var barcodeField = document.getElementById('co-barcode');
    var barcode = barcodeField.value.trim();
    var days = parseInt(document.getElementById('co-days').value) || 21;

      var errEl = document.getElementById('co-error');

        errEl.textContent = 'Please select a member first.';
        errEl.style.display = 'block';
      }
      barcodeField.value = '';
      document.getElementById('co-member-search').focus();
      return;
    }
    var errEl = document.getElementById('co-error');
    if (errEl) errEl.style.display = 'none';
    if (!barcode) return;

    barcodeField.disabled = true;
    showActionSpinner('co-spinner', 'Checking out…');

    google.script.run
      .withSuccessHandler(function (result) {
        hideActionSpinner('co-spinner');
        barcodeField.disabled = false;
        barcodeField.value = '';
        barcodeField.focus();
        var errEl = document.getElementById('co-error');

        barcodeField.value = '';
        barcodeField.focus();
        handleError(error);
      })

  }

      '</tr></thead><tbody id="ext-items-tbody"></tbody></table>' +
      '</div>' +
      '<div style="margin-top:20px">' +
      '<button class="btn btn-secondary" onclick="closeModal()">Close Session</button>' +
      '</div>';

    showModal('Extend', content);
    document.getElementById('modal-content').style.maxWidth = '640px';

    var barcodeField = document.getElementById('ext-barcode');
    barcodeField.focus();
    barcodeField.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        processCirculationExtend();
      }
    });
    attachBarcodeTypeahead('ext-barcode', processCirculationExtend);
  }

  function processCirculationExtend() {
    var barcodeField = document.getElementById('ext-barcode');
    var barcode = barcodeField.value.trim();
    var days = parseInt(document.getElementById('ext-days').value) || 21;
    if (!barcode) return;

    barcodeField.disabled = true;
    showActionSpinner('ext-spinner', 'Extending…');

    google.script.run
      .withSuccessHandler(function (result) {
        hideActionSpinner('ext-spinner');
        barcodeField.disabled = false;
        barcodeField.value = '';
        barcodeField.focus();
        if (result.success) {
          var section = document.getElementById('ext-items-section');
          var tbody = document.getElementById('ext-items-tbody');
          section.style.display = 'block';
          tbody.innerHTML +=
            '<tr>' +
            '<td style="padding:6px 8px;border-bottom:1px solid #f3f4f6">' + escapeHtml(result.title) + '</td>' +
            '<td style="padding:6px 8px;border-bottom:1px solid #f3f4f6">' + escapeHtml(barcode) + '</td>' +
            '<td style="padding:6px 8px;border-bottom:1px solid #f3f4f6">' + escapeHtml(result.newDueDate) + '</td>' +
            '</tr>';
        } else {
          showErrorDialog(result.error || 'Extension failed');
        }
      })
      .withFailureHandler(function (error) {
        hideActionSpinner('ext-spinner');
        barcodeField.disabled = false;
        barcodeField.value = '';
        barcodeField.focus();
        handleError(error);
      })
      .extendLoanByBarcode(barcode, days);
  }

  // ============================================================================
  // UTILITY FUNCTIONS
  // ============================================================================

  function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function escapeAttr(text) {
    if (typeof text == 'number') return text;
    if (!text || typeof text !== 'string') return '';
    return text.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // Toggles an inline spinner (markup: <div id=".." class="action-spinner">
  // <span class="spinner"></span><span class="spinner-text"></span></div>).
  function showActionSpinner(id, message) {
    var el = document.getElementById(id);
    if (!el) return;
    var text = el.querySelector('.spinner-text');
    if (text) text.textContent = message || 'Working…';
    el.style.display = 'flex';
  }

  function hideActionSpinner(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = 'none';
  }

  // Puts a button into a loading state (spinner + label) and disables it; used
  // for modal Save/Delete actions whose status message would otherwise sit
  // hidden behind the modal overlay. Pair with restoreButton() on completion.
  function setButtonLoading(btn, message) {
    if (!btn) return;
    if (btn.dataset.originalHtml == null) btn.dataset.originalHtml = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner spinner-light"></span> ' + escapeHtml(message || 'Working…');
  }

  function restoreButton(btn) {
    if (!btn) return;
    btn.disabled = false;
    if (btn.dataset.originalHtml != null) {
      btn.innerHTML = btn.dataset.originalHtml;
      delete btn.dataset.originalHtml;
    }
  }

  function showErrorDialog(message) {
    showModal(
      'Error',
      '<p style="white-space:pre-wrap;margin:0 0 16px 0">' + escapeHtml(message) + '</p>' +
      '<button type="button" class="btn btn-primary" onclick="closeModal()">OK</button>'
    );
  }

  function showStatus(message, type) {
    var statusArea = document.getElementById('status-area');
    statusArea.textContent = message;
    statusArea.className = 'status-area ' + type;

    if (type !== 'loading') {
      setTimeout(function () {
        statusArea.className = 'status-area';
      }, 3000);
    }
  }

  function handleError(error) {
    console.error(error);
    var msg = error.message || 'An error occurred';
    if (msg.indexOf('Access denied') !== -1) {
      showModal(
        'Access Denied',
        '<p>' + escapeHtml(msg) + '</p>' +
        '<p style="margin-top:12px;color:#6b7280;font-size:13px">' +
        'Contact your library administrator to have the spreadsheet shared with your account.' +
        '</p>'
      );
    } else {
      showStatus(msg, 'error');
    }
  }
</script>
